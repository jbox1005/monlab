<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>몬랩 - 파리지옥이</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3d4838">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="몬랩">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<style>
  @font-face {
    font-family: 'NeoDunggeunmo';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2107@1.1/NeoDunggeunmoPro-Regular.woff') format('woff');
    font-display: swap;
  }

  :root {
    --bg:         #f4e9cd;      /* 바깥 크림 */
    --panel:      #fff8e7;      /* 패널 크림 */
    --panel-alt:  #ffeec6;      /* 강조 패널 */
    --frame:      #a07b4b;      /* 진한 갈색 테두리 */
    --frame-soft: #d4b483;      /* 옅은 갈색 테두리 */
    --ink:        #4a3220;      /* 본문 텍스트 */
    --ink-soft:   #8b6a4a;      /* 보조 텍스트 */
    --accent:     #e57b3f;      /* 진한 오렌지(시간) */
    --warm:       #f3a957;      /* 밝은 머스타드(버튼) */
    --warm-h:     #ffc077;
    --pink:       #eb8a9c;
    --pink-h:     #f5a5b5;
    --mint:       #7cc6a3;
    --mint-h:     #9bd6b9;
    --shadow:     0 3px 0 rgba(74, 50, 32, 0.18);
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    background:
      radial-gradient(circle at 25% 15%, rgba(255, 240, 210, 0.45) 0%, transparent 50%),
      radial-gradient(circle at 75% 85%, rgba(220, 195, 160, 0.4) 0%, transparent 50%),
      linear-gradient(135deg, #c4b389 0%, #9c8b62 100%);
    font-family: 'NeoDunggeunmo', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 28px 12px;
    user-select: none;
    -webkit-user-select: none;
    -webkit-font-smoothing: none;
    image-rendering: pixelated;
  }

  /* ── 아이폰 프레임 ── */
  .phone-frame {
    position: relative;
    background: #14141c;
    border-radius: 46px;
    padding: 14px;
    box-shadow:
      inset 0 0 0 1px #444,
      inset 0 0 0 4px #232330,
      0 22px 44px rgba(0, 0, 0, 0.42),
      0 4px 10px rgba(0, 0, 0, 0.25);
  }
  .phone-notch {
    position: absolute;
    top: 26px;
    left: 50%;
    transform: translateX(-50%);
    width: 110px;
    height: 28px;
    background: #06060a;
    border-radius: 16px;
    z-index: 100;
    pointer-events: none;
  }
  .phone-home-indicator {
    position: absolute;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    background: rgba(255, 255, 255, 0.88);
    border-radius: 3px;
    z-index: 100;
    pointer-events: none;
  }
  .phone-screen {
    width: 390px;
    background: #3d4838;
    background-image:
      radial-gradient(ellipse at 25% 15%, rgba(95, 110, 80, 0.45) 0%, transparent 55%),
      radial-gradient(ellipse at 75% 85%, rgba(50, 60, 45, 0.5) 0%, transparent 55%);
    border-radius: 32px;
    overflow: hidden;
    padding: 64px 12px 38px;
    min-height: 820px;
    position: relative;
  }
  .app { width: 100%; max-width: 100%; }

  /* 작은 화면(실제 모바일 등) — 폰 프레임 숨김, iOS 안전영역 처리 */
  @media (max-width: 460px) {
    body { padding: 0; background: #3d4838; }
    .phone-frame { background: #3d4838; box-shadow: none; padding: 0; border-radius: 0; }
    .phone-notch, .phone-home-indicator { display: none; }
    .phone-screen {
      border-radius: 0;
      width: 100vw;
      min-height: 100vh;
      padding-top: calc(env(safe-area-inset-top, 0px) + 14px);
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
      padding-left: 14px;
      padding-right: 14px;
      background-image: none;
    }
  }

  /* ── 타이틀 배너 ── */
  .title-banner {
    margin: 16px 0 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .title-leaves {
    width: 56px;
    height: auto;
    image-rendering: pixelated;
    flex-shrink: 0;
    filter: drop-shadow(1px 1px 0 rgba(0,0,0,0.3));
  }
  .title-leaves.right { transform: scaleX(-1); }
  .banner-bg {
    background-image: url('assets/title_banner.png');
    background-size: 100% 100%;
    background-repeat: no-repeat;
    image-rendering: pixelated;
    padding: 8px 28px 10px;
    min-width: 200px;
    text-align: center;
    filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.25));
  }
  h2 {
    margin: 0;
    font-size: 18px;
    text-align: center;
    color: #4a3220;
    letter-spacing: 0.02em;
  }

  /* ── 상단 HUD (다크 글래스 카드) ── */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: linear-gradient(180deg, rgba(60, 70, 55, 0.72) 0%, rgba(40, 48, 38, 0.78) 100%);
    border: 2px solid rgba(115, 100, 75, 0.45);
    border-bottom: none;
    border-radius: 14px 14px 0 0;
    font-size: 15px;
    color: #ece2cd;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.07);
  }
  .stage { color: #ece2cd; font-weight: normal; }
  .clock { color: #f5dca8; font-size: 17px; letter-spacing: 0.05em; }
  .speed-toggle { display: flex; gap: 4px; }
  .speed-toggle button {
    padding: 4px 9px;
    font-size: 12px;
    background: rgba(255, 255, 255, 0.08);
    color: #b8a988;
    border: 1.5px solid rgba(180, 160, 120, 0.3);
    border-radius: 5px;
    cursor: pointer;
    box-shadow: none;
  }
  .speed-toggle button.active {
    background: var(--warm);
    color: var(--ink);
    border-color: var(--frame);
  }
  .day-arrows {
    display: flex;
    gap: 3px;
    margin-left: 6px;
  }
  .day-arrows button {
    padding: 3px 7px;
    font-size: 11px;
    background: rgba(255, 255, 255, 0.08);
    color: #ece2cd;
    border: 1.5px solid rgba(180, 160, 120, 0.3);
    border-radius: 3px;
    cursor: pointer;
    line-height: 1;
  }
  .day-arrows button:hover {
    background: var(--warm);
    border-color: var(--frame);
  }
  .day-arrows button:active { transform: translateY(1px); }

  .stats {
    display: flex;
    padding: 12px 14px;
    background: linear-gradient(180deg, rgba(40, 48, 38, 0.78) 0%, rgba(35, 42, 33, 0.82) 100%);
    border-left: 2px solid rgba(115, 100, 75, 0.45);
    border-right: 2px solid rgba(115, 100, 75, 0.45);
    border-bottom: 2px solid rgba(115, 100, 75, 0.45);
    border-radius: 0 0 14px 14px;
    gap: 14px;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .stat { flex: 1; display: flex; flex-direction: column; gap: 5px; }
  .stat-label {
    font-size: 13px;
    color: #ece2cd;
  }
  .gauge {
    display: flex;
    gap: 3px;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 11px;
    padding: 3px 7px;
    box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.3);
  }
  .gauge-cell-icon {
    width: 26px;
    height: 26px;
    image-rendering: pixelated;
    transition: filter 0.25s, opacity 0.25s, transform 0.1s;
  }
  .gauge-cell-icon.inactive {
    filter: grayscale(0.7) brightness(0.5);
    opacity: 0.35;
  }
  /* 활성 셀 미세 글로우 */
  #hunger-gauge .gauge-cell-icon:not(.inactive) {
    filter: drop-shadow(0 0 1px rgba(255, 200, 100, 0.6));
  }
  #happy-gauge .gauge-cell-icon:not(.inactive) {
    filter: drop-shadow(0 0 1px rgba(255, 160, 200, 0.7));
  }
  /* 마지막 활성 셀 강한 글로우 (게이지 끝 표시) */
  #hunger-gauge .gauge-cell-icon.glow-end {
    filter:
      drop-shadow(0 0 4px rgba(255, 210, 110, 0.95))
      drop-shadow(0 0 8px rgba(255, 180, 80, 0.7));
    transform: scale(1.05);
  }
  #happy-gauge .gauge-cell-icon.glow-end {
    filter:
      drop-shadow(0 0 4px rgba(255, 160, 210, 0.95))
      drop-shadow(0 0 8px rgba(255, 130, 190, 0.7));
    transform: scale(1.05);
  }

  /* ── 방 ── */
  #room {
    position: relative;
    width: 100%;
    height: 400px;
    border: 3px solid var(--frame);
    border-radius: 0 0 12px 12px;
    overflow: hidden;
    background-color: #fcf6e8;
    background-image:
      radial-gradient(ellipse 70% 55% at 50% 75%, rgba(255, 252, 240, 0.55) 0%, transparent 70%),
      url('assets/wall_a.png');
    background-repeat: no-repeat, repeat;
    background-size: auto, 64px 64px;
    box-shadow: var(--shadow), inset 0 0 60px rgba(120, 90, 50, 0.08);
    transition: filter 1s;
    image-rendering: pixelated;
  }
  #room.lights-off {
    filter: brightness(0.42) hue-rotate(-20deg) saturate(0.55);
  }
  #window {
    position: absolute;
    top: 30px; right: 30px;
    width: 80px; height: 60px;
    background: linear-gradient(to bottom, #a7c5e0 0%, #d0ecff 40%, #ecd9a9 100%);
    border: 3px solid #8a6b4b;
    border-radius: 4px;
    overflow: hidden;
    z-index: 1;
    transition: background 1.2s;
  }
  #window.night {
    background: linear-gradient(to bottom, #1b2a4a 0%, #30456e 60%, #4b3a60 100%);
  }
  #window.twilight-dawn {
    background: linear-gradient(to bottom, #4a3a6a 0%, #b98c88 50%, #f2cf9a 100%);
  }
  #window.twilight-dusk {
    background: linear-gradient(to bottom, #56436d 0%, #d88768 50%, #f2b578 100%);
  }
  #window::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    box-shadow:
      inset 0 0 0 2px #fff,
      inset -36px 0 0 -34px #8a6b4b,
      inset 0 -28px 0 -26px #8a6b4b;
    z-index: 3;
  }
  .celestial {
    position: absolute;
    width: 20px;
    height: auto;
    image-rendering: pixelated;
    z-index: 2;
    transition: opacity 0.8s;
    pointer-events: none;
  }
  .celestial.hidden { opacity: 0; }
  #sun  { filter: drop-shadow(0 0 4px rgba(255, 220, 100, 0.85)); }
  #moon { filter: drop-shadow(0 0 4px rgba(200, 220, 255, 0.6)); }
  .room-floor {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 30%;
    background-image: url('assets/floor_a.png');
    background-repeat: repeat;
    background-size: 64px 32px;
    border-top: 3px solid #8a6140;
    image-rendering: pixelated;
    z-index: 1;
  }
  .deco {
    position: absolute;
    image-rendering: pixelated;
    pointer-events: none;
    z-index: 2;
    filter: saturate(0.72) brightness(1.04);
    opacity: 0.92;
  }
  /* 스위치는 인터랙션 대상이라 채도 유지 */
  #light-switch { filter: none !important; opacity: 1 !important; }
  #deco-clock {
    width: 60px;
    height: 66px;
    top: 26px;
    left: 60px;
  }
  #deco-clock img {
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    display: block;
  }
  .clock-hand {
    position: absolute;
    background: #2a1a10;
    bottom: 50%;
    left: calc(50% - 1px);
    transform-origin: 50% 100%;
    z-index: 2;
    transform: rotate(0deg);
  }
  .clock-hand.hour { width: 2px; height: 11px; }
  .clock-hand.minute { width: 2px; height: 17px; }
  .light-switch {
    width: 28px;
    top: 110px;
    right: 52px;
    cursor: pointer;
    pointer-events: auto !important;
    transition: transform 0.08s;
    z-index: 3 !important;
  }
  .light-switch:hover { transform: scale(1.1); }
  .light-switch:active { transform: scale(0.92); }
  .dev-switch {
    width: 28px;
    top: 110px;
    right: 90px;
    cursor: pointer;
    pointer-events: auto !important;
    transition: transform 0.08s;
    z-index: 3 !important;
    filter: none !important;
    opacity: 1 !important;
  }
  .dev-switch:hover { transform: scale(1.1); }
  .dev-switch:active { transform: scale(0.92); }
  #deco-rug   { width: 150px; bottom: 26px; left: 50%; transform: translateX(-50%); }
  #deco-hanging-plant {
    width: 50px;
    top: 0;
    left: 28px;
    z-index: 2;
  }
  #deco-terrarium {
    width: 38px;
    bottom: 130px;
    left: 12px;
    z-index: 2;
  }
  #monster {
    position: absolute;
    left: 50%;
    bottom: 64px;
    width: auto;
    height: 144px;
    transform-origin: center bottom;
    image-rendering: pixelated;
    pointer-events: auto;
    cursor: pointer;
    will-change: transform, left, bottom;
    filter:
      drop-shadow(0 0 1px rgba(0,0,0,0.5))
      drop-shadow(3px 4px 0 rgba(0,0,0,0.32));
    z-index: 4;
  }
  #monster.evolving {
    animation: evolveGlow 1.8s ease-out;
  }
  @keyframes evolveGlow {
    0%   { filter: drop-shadow(2px 3px 2px rgba(0,0,0,0.25)); }
    30%  { filter: drop-shadow(0 0 12px rgba(255, 220, 120, 0.9)) brightness(1.3); }
    60%  { filter: drop-shadow(0 0 20px rgba(255, 200, 100, 0.7)) brightness(1.2); }
    100% { filter: drop-shadow(2px 3px 2px rgba(0,0,0,0.25)); }
  }
  .shadow {
    position: absolute;
    left: 50%;
    bottom: 56px;
    width: 110px;
    height: 11px;
    background: radial-gradient(ellipse at center,
      rgba(60, 40, 20, 0.4) 0%,
      rgba(60, 40, 20, 0) 70%);
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 3;
  }
  .item {
    position: absolute;
    transform: translateX(-50%);
    pointer-events: auto;
    will-change: transform, opacity, bottom;
    filter: drop-shadow(1px 2px 1px rgba(0,0,0,0.3));
    cursor: pointer;
    image-rendering: pixelated;
  }
  #call-bubble {
    position: absolute;
    top: 18%;
    left: 50%;
    transform: translateX(-50%);
    background: var(--panel);
    width: 48px;
    height: 48px;
    border: 3px solid var(--frame);
    border-radius: 14px 14px 14px 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: bounceBubble 0.7s ease-in-out infinite;
    box-shadow: 0 3px 0 rgba(74, 50, 32, 0.3);
    z-index: 6;
  }
  #call-bubble::after {
    content: "";
    position: absolute;
    bottom: -9px;
    left: 8px;
    width: 10px;
    height: 10px;
    background: var(--panel);
    border-right: 3px solid var(--frame);
    border-bottom: 3px solid var(--frame);
    transform: rotate(45deg);
  }
  #bubble-icon {
    width: 28px;
    height: 28px;
    image-rendering: pixelated;
  }
  @keyframes bounceBubble {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-8px); }
  }
  #orbit-fly {
    position: absolute;
    width: 44px;
    height: auto;
    pointer-events: none;
    image-rendering: pixelated;
    will-change: left, bottom, transform;
    z-index: 6;
  }
  #blanket {
    position: absolute;
    width: 130px;
    height: auto;
    pointer-events: none;
    image-rendering: pixelated;
    will-change: left, bottom, transform;
    z-index: 5;
    filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.22));
  }
  #blanket.hidden { display: none; }
  #orbit-fly.hidden { display: none; }

  .stage-selector {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 4px;
    font-size: 13px;
    color: var(--ink-soft);
  }
  .stage-selector select {
    flex: 1;
    padding: 6px 10px;
    background: var(--panel);
    color: var(--ink);
    border: 2px solid var(--frame-soft);
    border-radius: 5px;
    font-family: inherit;
    font-size: 13px;
  }
  .day-jumper {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 4px;
    font-size: 13px;
    color: var(--ink-soft);
    flex-wrap: wrap;
  }
  .day-jumper input {
    width: 60px;
    padding: 5px 8px;
    background: var(--panel);
    color: var(--ink);
    border: 2px solid var(--frame-soft);
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
  }
  .day-jumper button {
    padding: 5px 10px;
    font-size: 12px;
    background: var(--warm);
    color: var(--ink);
    border: 2px solid var(--frame);
    border-radius: 5px;
    box-shadow: 0 2px 0 rgba(74, 50, 32, 0.2);
    cursor: pointer;
  }
  .day-jumper button#day-up,
  .day-jumper button#day-down {
    padding: 4px 8px;
    font-size: 11px;
    background: var(--panel-alt);
  }
  .day-jumper button#day-up:hover,
  .day-jumper button#day-down:hover { background: var(--warm-h); }
  .day-jumper button:hover { background: var(--warm-h); }
  .day-jumper button:active { transform: translateY(1px); box-shadow: none; }
  #day-info {
    font-size: 11px;
    color: var(--ink-soft);
    opacity: 0.8;
  }

  #status {
    margin-top: 10px;
    padding: 6px 10px;
    background: transparent;
    border: none;
    font-family: Consolas, monospace;
    font-size: 11px;
    color: var(--ink-soft);
    opacity: 0.5;
    text-align: center;
  }
  /* 개발자 모드 토글 — D 키로 body.dev-mode on/off */
  .dev-only { display: none; }
  body.dev-mode .dev-only { display: flex; }
  body.dev-mode #status { display: block; }
  body.dev-mode details { display: block; }
  body.dev-mode .hint { display: block; }
  .hint, details, #status { display: none; }
  body.dev-mode::after {
    content: "DEV";
    position: fixed;
    top: 10px; right: 14px;
    background: #d85f6e;
    color: #fff;
    padding: 3px 10px;
    font-size: 11px;
    border-radius: 4px;
    letter-spacing: 0.1em;
    font-family: 'NeoDunggeunmo', sans-serif;
    z-index: 200;
    box-shadow: 0 2px 0 rgba(0,0,0,0.3);
  }

  .controls { display: grid; gap: 10px; margin-top: 12px; }
  .main-controls { grid-template-columns: repeat(2, 1fr); }
  .main-controls button[data-main="decorate"] { background: linear-gradient(180deg, #c1a682 0%, #9a7f5f 100%); }
  .main-controls button[data-main="decorate"]:hover { background: linear-gradient(180deg, #cfb591 0%, #a98e6e 100%); }
  .debug-controls { grid-template-columns: repeat(3, 1fr); margin-top: 8px; }

  button {
    padding: 15px 6px;
    font-size: 15px;
    background: var(--warm);
    color: var(--ink);
    border: 3px solid var(--frame);
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.08s, background 0.12s;
    box-shadow: 0 3px 0 rgba(74, 50, 32, 0.25);
  }
  button:hover { background: var(--warm-h); }
  button:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(74, 50, 32, 0.25); }
  button:disabled {
    background: #d8cbb3;
    color: #a59880;
    cursor: not-allowed;
    box-shadow: none;
  }
  button.active { background: var(--accent); color: #fff; }

  .main-controls button {
    border-radius: 14px;
    border: 2px solid rgba(45, 35, 20, 0.7);
    color: #fff8e8;
    font-size: 14px;
    padding: 10px 12px;
    box-shadow:
      0 3px 0 rgba(30, 25, 15, 0.45),
      inset 0 2px 0 rgba(255, 255, 255, 0.2),
      inset 0 -3px 6px rgba(0, 0, 0, 0.15);
    text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.3);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }
  .main-controls .btn-icon {
    width: 30px;
    height: auto;
    image-rendering: pixelated;
    flex-shrink: 0;
    filter: drop-shadow(1px 1px 0 rgba(0,0,0,0.25));
  }
  .main-controls .btn-leaf {
    width: 22px;
    height: auto;
    image-rendering: pixelated;
    flex-shrink: 0;
    opacity: 0.92;

  return {
    adultDays: 7 + Math.floor(Math.random() * 8),  // 7~14
    elderDays: 3 + Math.floor(Math.random() * 3),  // 3~5
  };
}

function getDayCount() {
  return Math.floor(GAME.lifeMinutes / DAY_MIN) + 1;
}

// 생애 누적 분 → 단계 이름
function resolveStage(lifeMin, plan) {
  if (lifeMin < EGG_DURATION_MIN) return '알';
  const day = Math.floor(lifeMin / DAY_MIN) + 1;
  if (day === 1) return '유아기';
  if (day <= 3) return '영아기';
  if (day <= 6) return '청소년기';
  const adultEnd = 6 + plan.adultDays;
  if (day <= adultEnd) return '청년기';
  const elderEnd = adultEnd + plan.elderDays;
  if (day <= elderEnd) return '노년기';
  return '사망';
}

function stageStartLifeMin(stage, plan) {
  switch (stage) {
    case '알':       return 0;
    case '유아기':   return EGG_DURATION_MIN;
    case '영아기':   return 1 * DAY_MIN;
    case '청소년기': return 3 * DAY_MIN;
    case '청년기':   return 6 * DAY_MIN;
    case '노년기':   return (6 + plan.adultDays) * DAY_MIN;
    case '사망':     return (6 + plan.adultDays + plan.elderDays) * DAY_MIN;
  }
  return 0;
}

  '알':       'assets/stage_egg.png',

};

const HUNGER_DRAIN_PER_MIN = 4 / (11 * 60);  // 활동시간 11h에 4칸
const HAPPY_DRAIN_PER_MIN = 4 / (11 * 60);

// ═════ 캐릭터 상태 ═════
const S = {

  facing: 1, sx: 1, sy: 1,

  currentState: 'idle',

  items: [],
};
const FLOOR_Y = 64;

const monsterEl = document.getElementById('monster');
const shadowEl = document.getElementById('shadow');
const roomEl = document.getElementById('room');
const statusEl = document.getElementById('status');
const callBubble = document.getElementById('call-bubble');
const orbitFlyEl = document.getElementById('orbit-fly');

function applyStageImage() {
  const src = STAGE_IMAGES[GAME.stage];
  if (src) monsterEl.src = src;
}

function triggerEvolveGlow() {
  monsterEl.classList.remove('evolving');
  void monsterEl.offsetWidth;
  monsterEl.classList.add('evolving');
  setTimeout(() => monsterEl.classList.remove('evolving'), 1900);
}

function updateStageFromLife() {
  const next = resolveStage(GAME.lifeMinutes, GAME.lifePlan);
  if (next !== GAME.stage) {
    const prev = GAME.stage;
    GAME.stage = next;
    applyStageImage();
    const sel = document.getElementById('stage-select');
    if (sel) sel.value = next;
    if (next === '사망' && !GAME.isDead) {
      GAME.isDead = true;
      toast(`파리지옥이 사망했어요... (${getDayCount()}일차, 엔딩 시스템 미구현)`, 5000);
    } else {
      if (prev === '알' && next === '유아기') {
        toast('알이 부화했어요!', 2500);
        setState('idle');
        triggerEvolveGlow();
      } else if (next !== '사망') {
        toast(`${prev} → ${next} 진화!`, 2200);
        triggerEvolveGlow();
      }
    }
  }
}

// ═════ 토스트 ═════
function toast(msg, dur = 1500) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), dur);
}

// ═════ 시간 유틸 ═════
function isSleepTime(gm) {
  const h = Math.floor((gm / 60) % 24);
  return h >= 21 || h < 10;
}
function formatClock(gm) {
  const h = Math.floor((gm / 60) % 24);
  const m = Math.floor(gm % 60);
  const ampm = h < 12 ? '오전' : '오후';
  const h12 = h % 12 === 0 ? 12 : h % 12;
  return `${ampm} ${h12}:${String(m).padStart(2, '0')}`;
}

// ═════ 응가 스케줄 ═════
function schedulePoops() {
  const startMin = 10 * 60, endMin = 21 * 60;
  const mid = (startMin + endMin) / 2;
  GAME.todayPoopTimes = [
    startMin + Math.random() * (mid - startMin - 30),
    mid + 30 + Math.random() * (endMin - mid - 60),
  ];
  GAME.todayPoopDone = [];
}

// ═════ 아이템 ═════
function addItem(src, xNorm, yPx, widthPx = 40, opts = {}) {
  const img = document.createElement('img');
  img.className = 'item';
  img.src = `assets/${src}.png`;
  img.style.width = widthPx + 'px';
  img.style.left = (xNorm * 100) + '%';
  img.style.bottom = yPx + 'px';
  img.dataset.life = '0';
  img.dataset.kind = src;
  if (opts.float) img.dataset.float = '1';
  if (opts.ttl) img.dataset.ttl = opts.ttl;
  if (opts.persistent) img.dataset.persistent = '1';
  roomEl.appendChild(img);
  S.items.push(img);
  return img;
}

function updateItems(dt) {
  for (let i = S.items.length - 1; i >= 0; i--) {
    const el = S.items[i];
    if (!el.isConnected) { S.items.splice(i, 1); continue; }
    let life = parseFloat(el.dataset.life || 0) + dt;
    el.dataset.life = life;
    if (el.dataset.float) {
      const b = parseFloat(el.style.bottom || 0);
      el.style.bottom = (b + 35 * dt) + 'px';
      const ttl = parseFloat(el.dataset.ttl || 2);
      el.style.opacity = Math.max(0, 1 - life / ttl);
      if (life > ttl) { el.remove(); S.items.splice(i, 1); }
    } else if (el.dataset.ttl) {
      const ttl = parseFloat(el.dataset.ttl);
      if (life > ttl) { el.remove(); S.items.splice(i, 1); }
    }
  }
}

function countPoops() {
  return S.items.filter(el => el.dataset.kind === 'poop').length;
}
function cleanPoops() {
  let removed = 0;
  for (let i = S.items.length - 1; i >= 0; i--) {
    if (S.items[i].dataset.kind === 'poop') {
      S.items[i].remove();
      S.items.splice(i, 1);
      removed++;
    }
  }
  return removed;
}

// ═════ Idle 하위 행동 (고양이 레퍼런스 기반 자율 AI) ═════
const MUTTERS = ['흠...', '냠', '냠냠', '히잉~', '쿠우~', '쫑긋', '?', '...'];

const idleBehaviors = {
  // 어슬렁거리며 걸어다님 (기존 좌우 반복 아님, 랜덤 방향 전환)
  wander: {
    weight: 3,
    duration: () => 4 + Math.random() * 5,
    enter(sd) {
      sd.speed = 0.07 + Math.random() * 0.05;
      sd.flipCd = 2 + Math.random() * 3;
    },
    update(sd, dt) {
      S.x += sd.speed * S.facing * dt;
      if (S.x > 0.78) { S.facing = -1; S.x = 0.78; }
      if (S.x < 0.22) { S.facing = 1; S.x = 0.22; }
      sd.flipCd -= dt;
      if (sd.flipCd <= 0) {
        S.facing *= -1;
        sd.flipCd = 1.5 + Math.random() * 2.5;
      }
      S.y = Math.abs(Math.sin(S.time * 4)) * 2.5;
      S.sx = 1; S.sy = 1;
    }
  },
  // 제자리에서 쉬기 (숨만 쉬며)
  rest: {
    weight: 4,
    duration: () => 5 + Math.random() * 8,
    enter(sd) { sd.t = 0; },
    update(sd, dt) {
      sd.t += dt;
      S.y = 0;
      S.sy = 1 + Math.sin(sd.t * 1.6) * 0.03;
      S.sx = 1 - Math.sin(sd.t * 1.6) * 0.018;
    }
  },
  // 한 방향 응시 (멍)
  gaze: {
    weight: 2,
    duration: () => 3 + Math.random() * 4,
    enter(sd) { S.facing = Math.random() < 0.5 ? -1 : 1; },
    update(sd, dt) {
      S.y = 0;
      S.sx = 1; S.sy = 1;
    }
  },
  // 연속 점프 2~3회
  hop: {
    weight: 1,
    duration: () => 2.5,
    enter(sd) { sd.vy = 0; sd.grounded = true; sd.hopCount = 0; sd.hopCd = 0.15; },
    update(sd, dt) {
      if (sd.grounded) {
        sd.hopCd -= dt;
        if (sd.hopCd <= 0 && sd.hopCount < 3) {
          sd.vy = 260; sd.grounded = false;
          sd.hopCount++;
          sd.hopCd = 0.3;
        }
      } else {
        S.y += sd.vy * dt;
        sd.vy -= 920 * dt;
        if (S.y <= 0) { S.y = 0; sd.vy = 0; sd.grounded = true; }
        S.sy = 1 + sd.vy / 1200;
        S.sx = 1 - (S.sy - 1) * 0.4;
      }
    }
  },
  // 구석에 박혀있기 (모서리로 이동해서 오래 머뭄)
  corner: {
    weight: 2,
    duration: () => 8 + Math.random() * 7,
    enter(sd) {
      sd.targetX = Math.random() < 0.5 ? 0.22 : 0.78;
      sd.arrived = false;
    },
    update(sd, dt) {
      if (!sd.arrived) {
        const dx = sd.targetX - S.x;
        if (Math.abs(dx) < 0.012) {
          sd.arrived = true;
          S.facing = (sd.targetX < 0.5) ? -1 : 1;
        } else {
          S.facing = dx > 0 ? 1 : -1;
          S.x += 0.11 * S.facing * dt;
          S.y = Math.abs(Math.sin(S.time * 4)) * 2.5;
        }
      } else {
        S.y = 0;
        S.sy = 1 + Math.sin(S.time * 1.3) * 0.025;
        S.sx = 1 - Math.sin(S.time * 1.3) * 0.015;
      }
    }
  },
  // 창밖 응시 (창문 앞으로 이동 + 위쪽 바라봄)
  windowStare: {
    weight: 1,
    duration: () => 5 + Math.random() * 4,
    enter(sd) { sd.targetX = 0.74; sd.arrived = false; },
    update(sd, dt) {
      if (!sd.arrived) {
        const dx = sd.targetX - S.x;
        if (Math.abs(dx) < 0.012) { sd.arrived = true; S.facing = 1; }
        else {
          S.facing = dx > 0 ? 1 : -1;
          S.x += 0.10 * S.facing * dt;
          S.y = Math.abs(Math.sin(S.time * 4)) * 2.5;
        }
      } else {
        S.y = 0;
        S.sy = 1.03; S.sx = 0.98;
      }
    }
  },
  // 파리에게 찰싹 (허공스냅, 실패)
  flySnap: {
    weight: 1,
    duration: () => 1.3,
    enter(sd) {
      sd.phase = 'wind'; sd.t = 0;
      const angle = S.time * 2.6;
      S.facing = Math.cos(angle) > 0 ? 1 : -1;
    },
    update(sd, dt) {
      sd.t += dt;
      if (sd.phase === 'wind') {
        const p = Math.min(sd.t / 0.3, 1);
        S.sy = 1 - p * 0.18; S.sx = 1 + p * 0.12;
        if (sd.t >= 0.3) { sd.phase = 'snap'; sd.t = 0; }
      } else if (sd.phase === 'snap') {
        const p = Math.min(sd.t / 0.2, 1);
        S.sy = 0.82 + p * 0.32; S.sx = 1.12 - p * 0.16;
        S.y = p * 10;
        if (sd.t >= 0.2) { sd.phase = 'land'; sd.t = 0; }
      } else {
        const p = Math.min(sd.t / 0.4, 1);
        S.sy = 1.14 - p * 0.14; S.sx = 0.96 + p * 0.04;
        S.y = 10 * (1 - p);
      }
    }
  },
  // 궁시렁 (텍스트 말풍선)
  mutter: {
    weight: 2,
    duration: () => 2.5,
    enter(sd) {
      const text = MUTTERS[Math.floor(Math.random() * MUTTERS.length)];
      const b = document.createElement('div');
      b.className = 'mutter-bubble';
      b.textContent = text;
      b.style.left = (S.x * 100) + '%';
      b.style.bottom = (FLOOR_Y + 130) + 'px';
      roomEl.appendChild(b);
      sd.bubble = b;
      sd.t = 0;
    },
    update(sd, dt) {
      sd.t += dt;
      S.y = Math.abs(Math.sin(S.time * 4)) * 1.5;
      S.sx = 1; S.sy = 1;
      if (sd.bubble) {
        sd.bubble.style.left = (S.x * 100) + '%';
        if (sd.t > 1.6) sd.bubble.style.opacity = Math.max(0, 1 - (sd.t - 1.6) / 0.8);
      }
    },
    exit(sd) {
      if (sd.bubble && sd.bubble.parentNode) sd.bubble.remove();
    }
  },
};

function getBehaviorWeight(name) {
  const base = idleBehaviors[name].weight;
  const stage = GAME.stage;
  if (stage === '노년기') {
    if (name === 'rest' || name === 'gaze') return base * 2.2;
    if (name === 'hop' || name === 'flySnap') return base * 0.3;
    if (name === 'wander') return base * 0.6;
  }
  if (stage === '유아기' || stage === '영아기') {
    if (name === 'hop' || name === 'mutter') return base * 2;
    if (name === 'corner' || name === 'windowStare') return base * 0.4;
    if (name === 'flySnap') return base * 0.3;
  }
  if (stage === '청소년기') {
    if (name === 'hop' || name === 'wander') return base * 1.5;
    if (name === 'rest') return base * 0.7;
  }
  return base;
}

function pickIdleBehavior(previous) {
  const names = Object.keys(idleBehaviors);
  const entries = names
    .filter(n => n !== previous || names.length === 1)
    .map(n => [n, getBehaviorWeight(n)]);
  const total = entries.reduce((s, [,w]) => s + w, 0);
  let r = Math.random() * total;
  for (const [n, w] of entries) {
    r -= w;
    if (r <= 0) return n;
  }
  return entries[0][0];
}

function setIdleBehavior(name) {
  const sd = S.stateData;
  const prev = sd.behaviorName;
  if (prev && idleBehaviors[prev] && idleBehaviors[prev].exit) {
    idleBehaviors[prev].exit(sd);
  }
  sd.behaviorName = name;
  sd.behaviorT = 0;
  sd.behaviorDur = idleBehaviors[name].duration();
  if (idleBehaviors[name].enter) idleBehaviors[name].enter(sd);
}

// ═════ 상태 정의 ═════
const states = {
  idle: {
    enter() {
      S.stateData = {};
      setIdleBehavior(pickIdleBehavior());
    },
    update(dt) {
      const sd = S.stateData;
      sd.behaviorT += dt;
      const b = idleBehaviors[sd.behaviorName];
      if (b) b.update(sd, dt);
      if (sd.behaviorT >= sd.behaviorDur) {
        setIdleBehavior(pickIdleBehavior(sd.behaviorName));
      }
    },
    exit() {
      const sd = S.stateData;
      const b = sd.behaviorName && idleBehaviors[sd.behaviorName];
      if (b && b.exit) b.exit(sd);
    }
  },
  activity: {
    enter() { S.stateData = { speed: 0.32, jumpCooldown: 1.0, vy: 0, grounded: true }; },
    update(dt) {
      const sd = S.stateData;
      if (sd.grounded) {
        S.x += sd.speed * S.facing * dt;
        if (S.x > 0.85) { S.facing = -1; S.x = 0.85; }
        if (S.x < 0.15) { S.facing = 1; S.x = 0.15; }
        S.y = Math.abs(Math.sin(S.time * 14)) * 8;
        sd.jumpCooldown -= dt;
        if (sd.jumpCooldown <= 0) {
          sd.vy = 320; sd.grounded = false;
          sd.jumpCooldown = 1.2 + Math.random() * 1.5;
        }
      } else {
        S.x += sd.speed * 0.6 * S.facing * dt;
        S.y += sd.vy * dt;
        sd.vy -= 900 * dt;
        if (S.y <= 0) { S.y = 0; sd.vy = 0; sd.grounded = true; }
        S.sy = 1 + sd.vy / 1000;
        S.sx = 1 - (S.sy - 1) * 0.4;
      }
    }
  },
  eat: {
    enter() {
      // 파리는 캐릭터 머리 위 공중에 고정 등장
      const fx = S.x;
      const fy = 175;
      const foodEl = addItem('fly', fx, fy, 36);
      foodEl.style.zIndex = 5;
      S.stateData = {
        phase: 'wait',
        food: { x: fx, y: fy, el: foodEl },
        bitesTotal: 3,
        bitesLeft: 3,
        t: 0,
        bitTaken: false,
        completed: false,
      };
    },
    update(dt) {
      const sd = S.stateData;
      sd.t += dt;
      if (sd.phase === 'wait') {
        // 한 박자 쉬고 첫 베어물기
        S.sx = 1; S.sy = 1; S.y = 0;
        if (sd.t > 0.28) { sd.phase = 'wind'; sd.t = 0; sd.bitTaken = false; }
      } else if (sd.phase === 'wind') {
        // 입 벌리기 — 옆으로 납작
        const p = Math.min(sd.t / 0.14, 1);
        S.sy = 1 - p * 0.18;
        S.sx = 1 + p * 0.14;
        if (sd.t > 0.14) { sd.phase = 'snap'; sd.t = 0; }
      } else if (sd.phase === 'snap') {
        // 위로 스냅 — 입 다물고 베어물기
        const p = Math.min(sd.t / 0.13, 1);
        S.sy = 0.82 + p * 0.40;
        S.sx = 1.14 - p * 0.20;
        // 스냅 정점에서 한 입 베어물기 (파리가 줄어듬)
        if (sd.t > 0.06 && !sd.bitTaken) {
          sd.bitTaken = true;
          sd.bitesLeft--;
          if (sd.bitesLeft > 0) {
            const ratio = sd.bitesLeft / sd.bitesTotal;
            sd.food.el.style.transform = `translateX(-50%) scale(${ratio})`;
            sd.food.el.style.filter = 'drop-shadow(1px 1px 0 rgba(0,0,0,0.3))';
          } else {
            sd.food.el.style.opacity = '0';
          }
        }
        if (sd.t > 0.16) {
          if (sd.bitesLeft <= 0) {
            sd.food.el.remove();
            sd.completed = true;
            setState('idle');
          } else {
            sd.phase = 'pause';
            sd.t = 0;
          }
        }
      } else if (sd.phase === 'pause') {
        // 씹어 삼킴
        S.sx = 1; S.sy = 1;
        if (sd.t > 0.18) { sd.phase = 'wind'; sd.t = 0; sd.bitTaken = false; }
      }
    },
    exit() {
      if (S.stateData.food && S.stateData.food.el && S.stateData.food.el.parentNode) {
        S.stateData.food.el.remove();
      }
      if (S.stateData.completed) {
        GAME.hunger = Math.min(4, GAME.hunger + 1);
        updateHUD();
      }
      S.sx = 1; S.sy = 1;
    }
  },
  poop: {
    enter() { S.stateData = { phase: 'squat', t: 0 }; },
    update(dt) {
      const sd = S.stateData;
      sd.t += dt;
      if (sd.phase === 'squat') {
        const p = Math.min(1, sd.t / 0.5);
        S.sy = 1 - p * 0.25;
        S.sx = 1 + p * 0.1;
        if (sd.t > 0.5) {
          addItem('poop', S.x, 50, 42, { persistent: true });
          sd.phase = 'standup'; sd.t = 0;
        }
      } else if (sd.phase === 'standup') {
        const p = Math.min(1, sd.t / 0.4);
        S.sy = 0.75 + p * 0.25;
        S.sx = 1.1 - p * 0.1;
        if (sd.t > 0.6) setState('idle');
      }
    },
    exit() { S.sx = 1; S.sy = 1; }
  },
  excited: {
    enter() { S.stateData = { vy: 0, grounded: true, jumpCd: 0, heartCd: 0 }; },
    update(dt) {
      const sd = S.stateData;
      if (sd.grounded) {
        sd.jumpCd -= dt;
        if (sd.jumpCd <= 0) { sd.vy = 360; sd.grounded = false; sd.jumpCd = 0.15; }
      } else {
        S.y += sd.vy * dt;
        sd.vy -= 950 * dt;
        if (S.y <= 0) { S.y = 0; sd.vy = 0; sd.grounded = true; }
        S.sy = 1 + sd.vy / 1400;
        S.sx = 1 - (S.sy - 1) * 0.5;
      }
      sd.heartCd -= dt;
      if (sd.heartCd <= 0) {
        sd.heartCd = 0.25 + Math.random() * 0.2;
        const hx = S.x + (Math.random() - 0.5) * 0.15;
        const hy = 140 + S.y + Math.random() * 60;
        addItem('heart', hx, hy, 24, { float: true, ttl: 1.6 });
      }
    }
  },
  sleep: {
    enter() { S.stateData = { breathe: 0, zzzCd: 0 }; },
    update(dt) {
      const sd = S.stateData;
      sd.breathe += dt;
      S.sy = 1 + Math.sin(sd.breathe * 1.4) * 0.05;
      S.sx = 1 - Math.sin(sd.breathe * 1.4) * 0.02;
      S.y = 0;
      sd.zzzCd -= dt;
      if (sd.zzzCd <= 0) {
        sd.zzzCd = 1.3;
        addItem('zzz', S.x + 0.06, 160, 44, { float: true, ttl: 2.2 });
      }
    }
  },
  egg: {
    enter() { S.stateData = { wobble: 0 }; S.x = 0.5; S.facing = 1; },
    update(dt) {
      const sd = S.stateData;
      sd.wobble += dt;
      S.x = 0.5;
      S.y = Math.abs(Math.sin(sd.wobble * 2)) * 2;
      S.sx = 1 + Math.sin(sd.wobble * 3) * 0.03;
      S.sy = 1 - Math.sin(sd.wobble * 3) * 0.03;
    }
  },
};

function setState(name) {
  if (states[S.currentState] && states[S.currentState].exit) {
    states[S.currentState].exit();
  }
  S.currentState = name;

  document.querySelectorAll('.debug-controls button').forEach(b => {
    b.classList.toggle('active', b.dataset.action === name);
  });
}

// ═════ 해·달 궤도 (창문 안) ═════
// 해: 오전 6시 → 오후 6시 (12시간 아치)
// 달: 오후 6시 → 익일 오전 6시 (12시간 아치)
function updateCelestials() {
  const sun = document.getElementById('sun');
  const moon = document.getElementById('moon');
  const windowEl = document.getElementById('window');
  if (!sun || !moon || !windowEl) return;

  const m = GAME.gameMinutes;
  const SUNRISE = 6 * 60, SUNSET = 18 * 60;
  const Wi = 74, Hi = 54; // 창문 내부 (80-6, 60-6)
  const size = 20;
  const arcW = Wi - size;
  const arcH = (Hi - size) * 0.85;

  let isSun, t;
  if (m >= SUNRISE && m < SUNSET) {
    isSun = true;
    t = (m - SUNRISE) / (SUNSET - SUNRISE); // 0..1
  } else {
    isSun = false;
    let m2 = m >= SUNSET ? m : m + 1440;
    t = (m2 - SUNSET) / 720;
  }

  const cx = t * arcW;
  const cy = (Hi - size) - Math.sin(t * Math.PI) * arcH;
  const body = isSun ? sun : moon;
  const other = isSun ? moon : sun;
  body.style.left = (cx + 3) + 'px';
  body.style.top = (cy + 3) + 'px';
  body.classList.remove('hidden');
  other.classList.add('hidden');

  // 창문 배경 색 (새벽/낮/황혼/밤)
  let skyClass = '';
  if (m >= 5 * 60 && m < 7 * 60)        skyClass = 'twilight-dawn';
  else if (m >= 7 * 60 && m < 17 * 60)  skyClass = '';         // 낮 (기본)
  else if (m >= 17 * 60 && m < 19 * 60) skyClass = 'twilight-dusk';
  else                                  skyClass = 'night';
  windowEl.classList.remove('twilight-dawn', 'twilight-dusk', 'night');
  if (skyClass) windowEl.classList.add(skyClass);
}

function updateGauge(id, val, kind) {
  const cells = document.querySelectorAll(`#${id} .gauge-cell-icon`);
  const filled = Math.ceil(val - 0.0001);
  cells.forEach((c, i) => {
    c.classList.toggle('inactive', i >= filled);
    c.classList.toggle('glow-end', i === filled - 1);
  });
}

// ═════ 게임 시간 루프 ═════
let prevGm = null;
function tickGame(realDt) {
  let newGm;
  if (GAME.speed === 1) {
    const now = new Date();
    newGm = now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60;
  } else {
    newGm = GAME.gameMinutes + realDt * GAME.speed / 60;
    if (newGm >= 1440) newGm -= 1440;
  }

  if (prevGm !== null) {
    let delta = newGm - prevGm;
    if (delta < 0) delta += 1440;

    // 생애 시간 전진 (사망 후 정지)
    if (!GAME.isDead) {
      GAME.lifeMinutes += delta;
      updateStageFromLife();
    }

    const stage = GAME.stage;
    const activeStage = stage !== '알' && stage !== '사망';
    const sleeping = isSleepTime(newGm);

    // 게이지 감소
    if (activeStage && !sleeping && !GAME.playActive) {
      GAME.hunger = Math.max(0, GAME.hunger - delta * HUNGER_DRAIN_PER_MIN);
      GAME.happiness = Math.max(0, GAME.happiness - delta * HAPPY_DRAIN_PER_MIN);
    }

    // 새 날이면 응가 재스케줄
    if (activeStage) {
      const curDay = getDayCount();
      if (curDay !== GAME.lastPoopDay) {
        schedulePoops();
        GAME.lastPoopDay = curDay;
      }

      for (const t of GAME.todayPoopTimes) {
        const crossed = (prevGm <= t && newGm > t) || (prevGm > newGm && (t > prevGm || t <= newGm));
        if (crossed && !GAME.todayPoopDone.includes(t)) {
          GAME.todayPoopDone.push(t);
          if (!GAME.playActive) {
            if (S.currentState === 'sleep') {
              addItem('poop', S.x, 50, 42, { persistent: true });
            } else {
              setState('poop');
            }
          }
        }
      }
    }
  }

  // 수면 자동 전환 (알·사망 제외)
  const shouldSleep = isSleepTime(newGm);
  const stage = GAME.stage;
  const canAutoTransition = stage !== '알' && stage !== '사망';
  if (!GAME.playActive && canAutoTransition) {
    if (shouldSleep && S.currentState !== 'sleep' && S.currentState !== 'poop' && S.currentState !== 'eat') {
      setState('sleep');
    } else if (!shouldSleep && S.currentState === 'sleep') {
      setState('idle');
      // 깨어났는데 불이 꺼져있으면 파리지옥이 자동으로 불을 켬
      if (!GAME.lightOn) {
        setLight(true);
        toast('파리지옥이 불을 켰어요');
      }
    }
  }

  GAME.gameMinutes = newGm;
  prevGm = newGm;
  updateHUD();
}

// ═════ 렌더 + 메인 루프 ═════
const blanketEl = document.getElementById('blanket');
function render() {
  monsterEl.style.left = (S.x * 100) + '%';
  monsterEl.style.bottom = (FLOOR_Y + S.y) + 'px';
  monsterEl.style.transform =
    `translateX(-50%) scaleX(${S.facing * S.sx}) scaleY(${S.sy})`;
  const heightFactor = Math.max(0.3, 1 - S.y / 120);
  shadowEl.style.left = (S.x * 100) + '%';
  shadowEl.style.width = (110 * heightFactor) + 'px';
  shadowEl.style.opacity = heightFactor;
  renderOrbitFly();
  renderBlanket();
}

function renderBlanket() {
  if (!blanketEl) return;
  if (S.currentState === 'sleep') {
    blanketEl.classList.remove('hidden');
    blanketEl.style.left = (S.x * 100) + '%';
    blanketEl.style.bottom = (FLOOR_Y + 4) + 'px';
    blanketEl.style.transform = `translateX(-50%) scaleY(${S.sy * 0.95 + 0.05})`;
  } else {
    blanketEl.classList.add('hidden');
  }
}

function renderOrbitFly() {
  if (S.currentState === 'eat') {
    orbitFlyEl.classList.add('hidden');
    return;
  }
  orbitFlyEl.classList.remove('hidden');
  const speed = (S.currentState === 'sleep') ? 1.0 : 2.6;
  const rX = 0.09;
  const rY = 22;
  const angle = S.time * speed;
  const cxPct = (S.x + Math.cos(angle) * rX) * 100;
  const cyPx = FLOOR_Y + S.y + 78 + Math.sin(angle) * rY;
  const vx = -Math.sin(angle);
  orbitFlyEl.style.left = cxPct + '%';
  orbitFlyEl.style.bottom = cyPx + 'px';
  orbitFlyEl.style.transform = `translateX(-50%) scaleX(${vx >= 0 ? 1 : -1})`;
}

let lastT = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  S.time += dt;
  tickGame(dt);
  const st = states[S.currentState];
  if (st && st.update) st.update(dt);
  updateItems(dt);
  render();
  requestAnimationFrame(loop);
}

// ═════ 참참참 놀이 ═════
const PLAY = {
  round: 0, score: 0,
  phase: 'idle',
  userDir: null, monsterDir: null,
  timerId: null,
};

const playModal = document.getElementById('play-modal');
const playChar = document.getElementById('play-char');
const playMsg = document.getElementById('play-message');
const dirBtns = document.getElementById('dir-buttons');
const playRoundEl = document.getElementById('play-round');
const playScoreEl = document.getElementById('play-score');
const finalResultEl = document.getElementById('final-result');
const playCloseBtn = document.getElementById('play-close');

function startPlay() {
  if (GAME.playActive) return;
  if (isSleepTime(GAME.gameMinutes)) {
    toast('지금은 자고 있어요');
    return;
  }
  const stage = GAME.stage;
  if (stage === '유아기' || stage === '영아기') {
    startCharCham();
  } else if (stage === '청소년기' || stage === '청년기') {
    startDinoGame();
  } else if (stage === '노년기') {
    startGomoku();
  } else {
    toast('지금은 놀 수 없어요');
  }
}

function startCharCham() {
  GAME.playActive = true;
  PLAY.round = 0;
  PLAY.score = 0;
  playChar.src = STAGE_IMAGES[GAME.stage] || 'assets/stage_adult.png';
  playMsg.className = 'play-message';
  finalResultEl.classList.add('hidden');
  playCloseBtn.classList.remove('hidden');
  playCloseBtn.textContent = '그만두기';
  dirBtns.classList.add('hidden');
  playModal.classList.remove('hidden');
  nextRound();
}

function nextRound() {
  PLAY.round++;
  if (PLAY.round > 5) { endPlay(); return; }
  PLAY.userDir = null;
  PLAY.monsterDir = null;
  PLAY.phase = 'countdown';
  playChar.style.transform = 'scaleX(1)';
  playRoundEl.textContent = `${PLAY.round} / 5 라운드`;
  playScoreEl.textContent = `맞춘 횟수: ${PLAY.score}`;
  playMsg.className = 'play-message';
  playMsg.textContent = '참~';
  dirBtns.classList.add('hidden');

  setTimeout(() => { playMsg.textContent = '참~'; }, 350);
  setTimeout(() => { playMsg.textContent = '참!'; }, 700);
  setTimeout(() => {
    PLAY.phase = 'input';
    PLAY.monsterDir = Math.random() < 0.5 ? -1 : 1;
    playChar.style.transform = `scaleX(${PLAY.monsterDir})`;
    playMsg.textContent = '→ 지금!';
    dirBtns.classList.remove('hidden');
    PLAY.timerId = setTimeout(() => {
      if (PLAY.userDir === null) judgeRound();
    }, 1600);
  }, 1100);
}

function onUserPick(dir) {
  if (PLAY.phase !== 'input' || PLAY.userDir !== null) return;
  clearTimeout(PLAY.timerId);
  PLAY.userDir = dir;
  judgeRound();
}

function judgeRound() {
  PLAY.phase = 'result';
  dirBtns.classList.add('hidden');
  const hit = (PLAY.userDir === PLAY.monsterDir);
  if (hit) PLAY.score++;
  if (PLAY.userDir === null) {
    playMsg.textContent = '늦었다!';
    playMsg.className = 'play-message result-no';
  } else if (hit) {
    playMsg.textContent = '맞췄다!';
    playMsg.className = 'play-message result-ok';
  } else {
    playMsg.textContent = '빗나감!';
    playMsg.className = 'play-message result-no';
  }
  playScoreEl.textContent = `맞춘 횟수: ${PLAY.score}`;
  setTimeout(nextRound, 1100);
}

function endPlay() {
  PLAY.phase = 'final';
  playMsg.textContent = '';
  dirBtns.classList.add('hidden');
  const win = (PLAY.score >= 3);
  finalResultEl.classList.remove('hidden');
  playCloseBtn.classList.remove('hidden');
  playCloseBtn.textContent = '닫기';
  if (win) {
    const gained = Math.min(4 - GAME.happiness, 1);
    GAME.happiness = Math.min(4, GAME.happiness + 1);
    finalResultEl.textContent = `${PLAY.score}/5 성공! 행복함 +1`;
    finalResultEl.className = 'final-result win';
  } else {
    finalResultEl.textContent = `${PLAY.score}/5 실패... 다음에 다시`;
    finalResultEl.className = 'final-result lose';
  }
  updateHUD();
}

function closePlay() {
  GAME.playActive = false;
  playModal.classList.add('hidden');
  PLAY.phase = 'idle';
  if (isSleepTime(GAME.gameMinutes)) setState('sleep');
  else setState('idle');
}

dirBtns.querySelectorAll('button').forEach(btn => {
  btn.addEventListener('click', () => onUserPick(parseInt(btn.dataset.dir)));
});
playCloseBtn.addEventListener('click', closePlay);

// ═════ 공룡 점프 게임 (청소년기/청년기) ═════
const DINO = {
  active: false, ended: false,
  startTime: 0, charY: 0, charVy: 0, jumping: false,
  obstacles: [], spawnTimer: 1.6, lastT: 0,
  speed: 200, duration: 60,
};

function startDinoGame() {
  GAME.playActive = true;
  DINO.active = true;
  DINO.ended = false;
  DINO.startTime = performance.now();
  DINO.lastT = DINO.startTime;
  DINO.charY = 0; DINO.charVy = 0; DINO.jumping = false;
  DINO.obstacles.forEach(o => o.el.remove());
  DINO.obstacles = [];
  DINO.spawnTimer = 1.6;

  document.getElementById('dino-char').src = STAGE_IMAGES[GAME.stage] || 'assets/stage_adult.png';
  document.getElementById('dino-result').classList.add('hidden');
  const dinoCloseEl = document.getElementById('dino-close');
  dinoCloseEl.classList.remove('hidden');
  dinoCloseEl.textContent = '그만두기';
  document.getElementById('dino-modal').classList.remove('hidden');

  requestAnimationFrame(dinoLoop);
}

function dinoLoop(now) {
  if (!DINO.active) return;
  const dt = Math.min(0.05, (now - DINO.lastT) / 1000);
  DINO.lastT = now;
  const elapsed = (now - DINO.startTime) / 1000;
  document.getElementById('dino-time').textContent = Math.max(0, Math.ceil(DINO.duration - elapsed));
  if (elapsed >= DINO.duration) { endDino(true); return; }

  // 캐릭터 점프 물리
  if (DINO.jumping) {
    DINO.charY += DINO.charVy * dt;
    DINO.charVy -= 1400 * dt;
    if (DINO.charY <= 0) { DINO.charY = 0; DINO.charVy = 0; DINO.jumping = false; }
  }
  document.getElementById('dino-char').style.bottom = `calc(30% + ${DINO.charY}px)`;

  // 장애물 스폰
  DINO.spawnTimer -= dt;
  if (DINO.spawnTimer <= 0) {
    spawnDinoObstacle();
    DINO.spawnTimer = 0.9 + Math.random() * 1.0;
  }

  // 장애물 이동 + 충돌
  const charLeft = 30, charRight = 30 + 40, charBottom = DINO.charY;
  for (let i = DINO.obstacles.length - 1; i >= 0; i--) {
    const o = DINO.obstacles[i];
    o.x -= DINO.speed * dt;
    if (o.x < -30) { o.el.remove(); DINO.obstacles.splice(i, 1); }
    else {
      o.el.style.left = o.x + 'px';
      // 충돌 체크 (캐릭터가 아직 점프 안 했으면)
      const oLeft = o.x + 3, oRight = o.x + 14;
      if (oRight > charLeft && oLeft < charRight && charBottom < 28) {
        endDino(false);
        return;
      }
    }
  }

  if (DINO.active) requestAnimationFrame(dinoLoop);
}

function spawnDinoObstacle() {
  const stage = document.getElementById('dino-stage');
  const w = stage.offsetWidth || 320;
  const el = document.createElement('div');
  el.className = 'dino-obstacle';
  el.style.left = w + 'px';
  stage.appendChild(el);
  DINO.obstacles.push({ el, x: w });
}

function dinoJump() {
  if (!DINO.active || DINO.jumping) return;
  DINO.jumping = true;
  DINO.charVy = 380;
}

function endDino(win) {
  DINO.active = false;
  DINO.ended = true;
  const result = document.getElementById('dino-result');
  if (win) {
    GAME.happiness = Math.min(4, GAME.happiness + 1);
    result.textContent = '60초 생존! 행복함 +1';
    result.className = 'final-result win';
  } else {
    const t = Math.max(1, Math.floor((performance.now() - DINO.startTime) / 1000));
    result.textContent = `${t}초 만에 부딪힘. 다음에 다시!`;
    result.className = 'final-result lose';
  }
  result.classList.remove('hidden');
  const dcb = document.getElementById('dino-close');
  dcb.classList.remove('hidden');
  dcb.textContent = '닫기';
  updateHUD();
}

function closeDino() {
  GAME.playActive = false;
  DINO.active = false;
  DINO.obstacles.forEach(o => o.el.remove());
  DINO.obstacles = [];
  document.getElementById('dino-modal').classList.add('hidden');
  if (isSleepTime(GAME.gameMinutes)) setState('sleep');
  else setState('idle');
}

document.getElementById('dino-jump').addEventListener('click', dinoJump);
document.getElementById('dino-close').addEventListener('click', closeDino);
document.addEventListener('keydown', (e) => {
  if (DINO.active && (e.code === 'Space' || e.key === ' ')) {
    e.preventDefault();
    dinoJump();
  }
});

// ═════ 오목 (노년기) ═════
const GOMOKU = { active: false, ended: false, size: 9, board: null, turn: 'B' };

function startGomoku() {
  GAME.playActive = true;
  GOMOKU.active = true;
  GOMOKU.ended = false;
  GOMOKU.board = Array(GOMOKU.size).fill(0).map(() => Array(GOMOKU.size).fill(0));
  GOMOKU.turn = 'B';
  document.getElementById('gomoku-modal').classList.remove('hidden');
  document.getElementById('gomoku-result').classList.add('hidden');
  const gcb = document.getElementById('gomoku-close');
  gcb.classList.remove('hidden');
  gcb.textContent = '그만두기';
  document.getElementById('gomoku-status').textContent = '당신 차례 (검정)';
  renderGomokuBoard();
}

function renderGomokuBoard() {
  const boardEl = document.getElementById('gomoku-board');
  boardEl.innerHTML = '';
  for (let r = 0; r < GOMOKU.size; r++) {
    for (let c = 0; c < GOMOKU.size; c++) {
      const cell = document.createElement('div');
      cell.className = 'gomoku-cell';
      const v = GOMOKU.board[r][c];
      if (v === 'B') cell.classList.add('black');
      else if (v === 'W') cell.classList.add('white');
      cell.addEventListener('click', () => gomokuPlace(r, c));
      boardEl.appendChild(cell);
    }
  }
}

function gomokuPlace(r, c) {
  if (!GOMOKU.active || GOMOKU.ended || GOMOKU.turn !== 'B') return;
  if (GOMOKU.board[r][c] !== 0) return;
  GOMOKU.board[r][c] = 'B';
  renderGomokuBoard();
  if (gomokuCheckWin(r, c, 'B')) { endGomoku(true); return; }
  if (gomokuFull()) { endGomoku(null); return; }
  GOMOKU.turn = 'W';
  document.getElementById('gomoku-status').textContent = '컴퓨터 차례...';
  setTimeout(gomokuComputerMove, 600);
}

function gomokuComputerMove() {
  if (!GOMOKU.active || GOMOKU.ended) return;
  const move = gomokuFindMove();
  if (move) {
    GOMOKU.board[move.r][move.c] = 'W';
    renderGomokuBoard();
    if (gomokuCheckWin(move.r, move.c, 'W')) { endGomoku(false); return; }
    if (gomokuFull()) { endGomoku(null); return; }
  }
  GOMOKU.turn = 'B';
  document.getElementById('gomoku-status').textContent = '당신 차례 (검정)';
}

// 한 셀에서의 한 방향 패턴 점수 계산 (이미 board[r][c] = color 가정)
function scorePatternAt(r, c, color) {
  const N = GOMOKU.size;
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  let total = 0;
  for (const [dr, dc] of dirs) {
    let count = 1;
    let openL = false, openR = false;
    let i = 1;
    while (true) {
      const nr = r + dr*i, nc = c + dc*i;
      if (nr < 0 || nr >= N || nc < 0 || nc >= N) break;
      const v = GOMOKU.board[nr][nc];
      if (v === color) { count++; i++; if (count >= 5) break; }
      else { if (v === 0) openR = true; break; }
    }
    i = 1;
    while (true) {
      const nr = r - dr*i, nc = c - dc*i;
      if (nr < 0 || nr >= N || nc < 0 || nc >= N) break;
      const v = GOMOKU.board[nr][nc];
      if (v === color) { count++; i++; if (count >= 5) break; }
      else { if (v === 0) openL = true; break; }
    }
    if (count >= 5)         total += 100000;                     // 승
    else if (count === 4) {
      if (openL && openR)   total += 10000;                      // 열린 4 (필승)
      else if (openL || openR) total += 1000;                    // 닫힌 4
    }
    else if (count === 3) {
      if (openL && openR)   total += 1000;                       // 열린 3 (위협)
      else if (openL || openR) total += 80;
    }
    else if (count === 2) {
      if (openL && openR)   total += 80;                         // 열린 2
      else if (openL || openR) total += 8;
    }
    else if (count === 1) {
      if (openL && openR)   total += 4;
    }
  }
  return total;
}

function gomokuFindMove() {
  const N = GOMOKU.size;

  // 첫 수: 가운데
  let hasStones = false;
  for (let r = 0; r < N && !hasStones; r++)
    for (let c = 0; c < N && !hasStones; c++)
      if (GOMOKU.board[r][c] !== 0) hasStones = true;
  if (!hasStones) return { r: Math.floor(N/2), c: Math.floor(N/2) };

  // 후보 셀 (기존 돌의 2칸 반경 내)
  const candidates = [];
  for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
    if (GOMOKU.board[r][c] !== 0) continue;
    let near = false;
    for (let dr = -2; dr <= 2 && !near; dr++) {
      for (let dc = -2; dc <= 2 && !near; dc++) {
        const nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < N && nc >= 0 && nc < N && GOMOKU.board[nr][nc] !== 0) near = true;
      }
    }
    if (near) candidates.push({ r, c });
  }

  let bestMove = null;
  let bestScore = -1;
  const ties = [];

  for (const { r, c } of candidates) {
    // 공격 점수 (컴퓨터가 여기 두면)
    GOMOKU.board[r][c] = 'W';
    const off = scorePatternAt(r, c, 'W');
    GOMOKU.board[r][c] = 0;
    // 수비 점수 (상대가 여기 두면 — 차단해야 할 가치)
    GOMOKU.board[r][c] = 'B';
    const def = scorePatternAt(r, c, 'B');
    GOMOKU.board[r][c] = 0;
    // 공격 우선이지만 수비도 거의 동등하게 (동점 시 공격 선택)
    const score = Math.max(off + 1, def);

    if (score > bestScore) {
      bestScore = score;
      bestMove = { r, c };
      ties.length = 0;
      ties.push({ r, c });
    } else if (score === bestScore) {
      ties.push({ r, c });
    }
  }

  // 동점 후보 중 랜덤 (예측 불가능성)
  if (ties.length > 1) return ties[Math.floor(Math.random() * ties.length)];
  return bestMove;
}

function gomokuCheckWin(r, c, color) {
  const N = GOMOKU.size;
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (const [dr, dc] of dirs) {
    let count = 1;
    for (let i = 1; i < 5; i++) {
      const nr = r + dr*i, nc = c + dc*i;
      if (nr < 0 || nr >= N || nc < 0 || nc >= N || GOMOKU.board[nr][nc] !== color) break;
      count++;
    }
    for (let i = 1; i < 5; i++) {
      const nr = r - dr*i, nc = c - dc*i;
      if (nr < 0 || nr >= N || nc < 0 || nc >= N || GOMOKU.board[nr][nc] !== color) break;
      count++;
    }
    if (count >= 5) return true;
  }
  return false;
}

function gomokuFull() {
  for (let r = 0; r < GOMOKU.size; r++)
    for (let c = 0; c < GOMOKU.size; c++)
      if (GOMOKU.board[r][c] === 0) return false;
  return true;
}

function endGomoku(result) {
  GOMOKU.ended = true;
  const r = document.getElementById('gomoku-result');
  if (result === true) {
    GAME.happiness = Math.min(4, GAME.happiness + 1);
    r.textContent = '승리! 행복함 +1';
    r.className = 'final-result win';
  } else if (result === false) {
    r.textContent = '패배. 다음에 다시!';
    r.className = 'final-result lose';
  } else {
    r.textContent = '무승부.';
    r.className = 'final-result';
  }
  r.classList.remove('hidden');
  const gcb2 = document.getElementById('gomoku-close');
  gcb2.classList.remove('hidden');
  gcb2.textContent = '닫기';
  document.getElementById('gomoku-status').textContent = '게임 종료';
  updateHUD();
}

function closeGomoku() {
  GAME.playActive = false;
  GOMOKU.active = false;
  document.getElementById('gomoku-modal').classList.add('hidden');
  if (isSleepTime(GAME.gameMinutes)) setState('sleep');
  else setState('idle');
}

document.getElementById('gomoku-close').addEventListener('click', closeGomoku);

// ═════ 방 꾸미기 (디자인 선택) ═════
const ROOM_DESIGNS = ['a', 'b', 'c'];
const ROOM_DEFAULTS = { wall: 'a', floor: 'a', rug: 'a', blanket: 'a', clock: 'a' };
let ROOM_SELECTION = loadRoomSelection();

function loadRoomSelection() {
  try {
    const raw = localStorage.getItem('monlab_room');
    if (raw) return Object.assign({}, ROOM_DEFAULTS, JSON.parse(raw));
  } catch (e) {}
  return Object.assign({}, ROOM_DEFAULTS);
}

function saveRoomSelection() {
  try { localStorage.setItem('monlab_room', JSON.stringify(ROOM_SELECTION)); } catch (e) {}
}

function applyRoomDesign(category, variant) {
  ROOM_SELECTION[category] = variant;
  saveRoomSelection();
  if (category === 'wall') {
    roomEl.style.backgroundImage =
      `radial-gradient(ellipse 70% 55% at 50% 75%, rgba(255, 252, 240, 0.55) 0%, transparent 70%), url('assets/wall_${variant}.png')`;
  } else if (category === 'floor') {
    document.querySelector('.room-floor').style.backgroundImage = `url('assets/floor_${variant}.png')`;
  } else if (category === 'rug') {
    document.getElementById('deco-rug').src = `assets/rug_${variant}.png`;
  } else if (category === 'blanket') {
    document.getElementById('blanket').src = `assets/blanket_${variant}.png`;
  } else if (category === 'clock') {
    document.querySelector('#deco-clock img').src = `assets/clock_${variant}.png`;
  }
  updateDecorateMenuSelection();
}

function applyAllRoomDesigns() {
  for (const cat in ROOM_SELECTION) {
    applyRoomDesign(cat, ROOM_SELECTION[cat]);
  }
}

function updateDecorateMenuSelection() {
  document.querySelectorAll('#decorate-modal button[data-cat]').forEach(btn => {
    const cat = btn.dataset.cat;
    const v = btn.dataset.variant;
    btn.classList.toggle('selected', ROOM_SELECTION[cat] === v);
  });
}

document.querySelectorAll('#decorate-modal button[data-cat]').forEach(btn => {
  btn.addEventListener('click', () => {
    applyRoomDesign(btn.dataset.cat, btn.dataset.variant);
  });
});
document.getElementById('decorate-close').addEventListener('click', () => {
  document.getElementById('decorate-modal').classList.add('hidden');
});

// ═════ 조명 스위치 클릭 ═════
document.getElementById('light-switch').addEventListener('click', (e) => {
  e.stopPropagation();
  setLight(!GAME.lightOn);
});

// ═════ 몬스터 터치 (하트 뿜기) ═════
monsterEl.addEventListener('click', (e) => {
  e.stopPropagation();
  if (GAME.stage === '알') {
    // 알 터치 시 살짝 더 흔들기
    if (S.stateData) S.stateData.wobble = (S.stateData.wobble || 0) + 0.6;
    return;
  }
  if (GAME.stage === '사망') return;
  for (let i = 0; i < 3; i++) {
    setTimeout(() => {
      const hx = S.x + (Math.random() - 0.5) * 0.12;
      const hy = 130 + Math.random() * 30;
      addItem('heart', hx, hy, 22, { float: true, ttl: 1.3 });
    }, i * 80);
  }
});

// ═════ 개발자 모드 토글 (D 키 / 빨간 스위치) ═════
function setDevMode(on) {
  document.body.classList.toggle('dev-mode', on);
  const sw = document.getElementById('dev-switch');
  if (sw) sw.src = on ? 'assets/dev_switch_on.png' : 'assets/dev_switch_off.png';
}

document.addEventListener('keydown', (e) => {
  const tag = (e.target.tagName || '').toLowerCase();
  if (tag === 'input' || tag === 'select' || tag === 'textarea') return;
  if (e.key === 'd' || e.key === 'D' || e.key === 'ㅇ') {
    const on = !document.body.classList.contains('dev-mode');
    setDevMode(on);
    toast(on ? '개발자 모드 켜짐' : '개발자 모드 꺼짐');
  }
});

document.getElementById('dev-switch').addEventListener('click', (e) => {
  e.stopPropagation();
  const on = !document.body.classList.contains('dev-mode');
  setDevMode(on);
  toast(on ? '개발자 모드 켜짐' : '개발자 모드 꺼짐');
});

// ═════ 메인 액션 버튼 ═════
document.querySelectorAll('[data-main]').forEach(btn => {
  btn.addEventListener('click', () => {
    const action = btn.dataset.main;
    if (action === 'decorate') {
      document.getElementById('decorate-modal').classList.remove('hidden');
      updateDecorateMenuSelection();
      return;
    }
    if (GAME.stage === '알') { toast('아직 알이에요'); return; }
    if (GAME.stage === '사망') { toast('파리지옥이 이미 떠났어요'); return; }
    if (action === 'feed') {
      if (isSleepTime(GAME.gameMinutes)) { toast('지금은 자고 있어요'); return; }
      if (GAME.hunger >= 4 - 0.01) { toast('파리지옥이 배불러해요!'); return; }
      if (GAME.playActive) return;
      setState('eat');
    } else if (action === 'play') {
      startPlay();
    } else if (action === 'clean') {
      const n = cleanPoops();
      if (n === 0) toast('치울 것이 없어요');
      else toast(`${n}개 청소 완료!`);
    } else if (action === 'decorate') {
      document.getElementById('decorate-modal').classList.remove('hidden');
      updateDecorateMenuSelection();
    }
  });
});

// ═════ 디버그 버튼 ═════
document.querySelectorAll('[data-action]').forEach(btn => {
  btn.addEventListener('click', () => {
    if (GAME.playActive) return;
    setState(btn.dataset.action);
  });
});

// ═════ 속도 토글 ═════
document.querySelectorAll('.speed-toggle button').forEach(btn => {
  btn.addEventListener('click', () => {
    GAME.speed = parseInt(btn.dataset.speed);
    document.querySelectorAll('.speed-toggle button').forEach(b =>
      b.classList.toggle('active', b === btn));
    if (GAME.speed === 1) {
      const now = new Date();
      GAME.gameMinutes = now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60;
      prevGm = GAME.gameMinutes;
    }
  });
});

// ═════ 단계 선택기 (생애 분 스냅) ═════
document.getElementById('stage-select').addEventListener('change', (e) => {
  const stage = e.target.value;
  GAME.lifeMinutes = stageStartLifeMin(stage, GAME.lifePlan);
  GAME.stage = stage;
  GAME.isDead = (stage === '사망');
  GAME.lastPoopDay = 0;
  applyStageImage();
  if (stage === '알') setState('egg');
  else if (stage !== '사망') setState(isSleepTime(GAME.gameMinutes) ? 'sleep' : 'idle');
  updateHUD();
});

// ═════ 일차 직접 이동 (디버그) ═════
function updateDayInfo() {
  const info = document.getElementById('day-info');
  if (info && GAME.lifePlan) {
    const total = 6 + GAME.lifePlan.adultDays + GAME.lifePlan.elderDays;
    info.textContent = `(수명 ${total}일: 청년 ${GAME.lifePlan.adultDays}일, 노년 ${GAME.lifePlan.elderDays}일)`;
  }
}

function jumpToDay(day, withToast = false) {
  if (isNaN(day) || day < 1) day = 1;
  if (day > 30) day = 30;
  document.getElementById('day-input').value = day;
  GAME.lifeMinutes = (day === 1) ? EGG_DURATION_MIN : (day - 1) * DAY_MIN;
  const newStage = resolveStage(GAME.lifeMinutes, GAME.lifePlan);
  GAME.stage = newStage;
  GAME.isDead = (newStage === '사망');
  GAME.lastPoopDay = 0;
  const sel = document.getElementById('stage-select');
  if (sel) sel.value = newStage;
  applyStageImage();
  if (newStage === '알') setState('egg');
  else if (newStage !== '사망') setState(isSleepTime(GAME.gameMinutes) ? 'sleep' : 'idle');
  updateHUD();
  if (withToast) toast(`${day}일차 (${newStage})`);
}

document.getElementById('day-jump').addEventListener('click', () => {
  jumpToDay(parseInt(document.getElementById('day-input').value), true);
});
document.getElementById('day-up').addEventListener('click', () => {
  jumpToDay(getDayCount() + 1, false);
});
document.getElementById('day-down').addEventListener('click', () => {
  jumpToDay(getDayCount() - 1, false);
});
document.getElementById('day-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('day-jump').click();
});

// 토글 옆 ▲▼ 버튼
document.getElementById('topbar-day-up').addEventListener('click', () => {
  jumpToDay(getDayCount() + 1, false);
});
document.getElementById('topbar-day-down').addEventListener('click', () => {
  jumpToDay(getDayCount() - 1, false);
});

// ═════ 시작 ═════
function init() {
  const now = new Date();
  GAME.gameMinutes = now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60;
  prevGm = GAME.gameMinutes;
  GAME.lifePlan = rollLifePlan();
  GAME.lifeMinutes = 0;
  GAME.stage = resolveStage(GAME.lifeMinutes, GAME.lifePlan);
  GAME.lastPoopDay = 0;
  const sel = document.getElementById('stage-select');
  if (sel) sel.value = GAME.stage;
  console.log(`[MonLab] 수명 계획: 청년기 ${GAME.lifePlan.adultDays}일, 노년기 ${GAME.lifePlan.elderDays}일 (총 ${6 + GAME.lifePlan.adultDays + GAME.lifePlan.elderDays}일)`);
  updateDayInfo();
  applyStageImage();
  applyAllRoomDesigns();
  setState('egg');
  updateHUD();
  setTimeout(() => toast('빨간 스위치(또는 D키)로 개발자 모드', 3500), 1800);
}
init();
requestAnimationFrame(loop);
